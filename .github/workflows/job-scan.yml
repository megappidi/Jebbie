name: Job Bot

on:
  schedule:
    - cron: '30 13 * * *'   # 9:30am EDT (UTC-4)
    - cron: '0 23 * * *'    # 7:00pm EDT (UTC-4)
  workflow_dispatch:
    inputs:
      on_demand:
        description: 'Triggered via Slack /jobs command'
        required: false
        default: 'false'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run job bot
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ON_DEMAND: ${{ github.event.inputs.on_demand || 'false' }}
        run: python job_bot.py

      - name: Save seen jobs
        run: |
          git config user.email "action@github.com"
          git config user.name "Job Bot"
          git add seen_jobs.json
          git diff --staged --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
